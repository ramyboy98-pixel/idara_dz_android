name: idara_dz_android
description: IDARA DZ Android app rebuilt from the desktop version.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  file_picker: ^8.0.7
  url_launcher: ^6.3.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  pdf: ^3.10.8
  archive: ^3.6.1

dev_dependencies:
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/services/
