name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17 without setup-java action
        run: |
          echo "Checking Java installation..."
          if ! command -v java >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
          fi
          java -version
          echo "JAVA_HOME=${JAVA_HOME_17_X64:-/usr/lib/jvm/java-17-openjdk-amd64}" >> $GITHUB_ENV

      - name: Install Flutter manually without flutter-action
        run: |
          git clone https://github.com/flutter/flutter.git "$HOME/flutter" --depth 1 --branch 3.24.5
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          "$HOME/flutter/bin/flutter" config --no-analytics
          "$HOME/flutter/bin/flutter" --version

      - name: Create Android platform files if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --org com.idaradz
          fi

      - name: Remove default Flutter test file
        run: rm -rf test

      - name: Install custom MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/idaradz/idara_dz_android
          cp tools/android/MainActivity.kt android/app/src/main/kotlin/com/idaradz/idara_dz_android/MainActivity.kt

      - name: Force modern Android SDK settings
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          text = p.read_text()
          text = text.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 35')
          text = text.replace('compileSdk flutter.compileSdkVersion', 'compileSdk 35')
          text = text.replace('compileSdkVersion 34', 'compileSdkVersion 35')
          text = text.replace('compileSdk = 34', 'compileSdk = 35')
          text = text.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35')
          text = text.replace('targetSdk flutter.targetSdkVersion', 'targetSdk 35')
          text = text.replace('targetSdkVersion 34', 'targetSdkVersion 35')
          text = text.replace('targetSdk = 34', 'targetSdk = 35')
          text = text.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
          text = text.replace('minSdk flutter.minSdkVersion', 'minSdk 23')
          p.write_text(text)
          PY

      - name: Get packages
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDARA-DZ-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
