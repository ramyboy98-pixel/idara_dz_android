name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17 without setup-java action
        run: |
          echo "Checking Java installation..."
          if ! command -v java >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
          fi
          java -version
          echo "JAVA_HOME=${JAVA_HOME_17_X64:-/usr/lib/jvm/java-17-openjdk-amd64}" >> $GITHUB_ENV

      - name: Install Flutter manually without flutter-action
        run: |
          set -e
          FLUTTER_DIR="$HOME/flutter"
          if [ ! -d "$FLUTTER_DIR" ]; then
            git clone https://github.com/flutter/flutter.git "$FLUTTER_DIR" --depth 1 --branch 3.24.5
          fi
          echo "$FLUTTER_DIR/bin" >> $GITHUB_PATH
          "$FLUTTER_DIR/bin/flutter" config --no-analytics
          "$FLUTTER_DIR/bin/flutter" --version

      - name: Create Android platform files if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --org com.idaradz
          fi

      - name: Install native WebView PDF bridge
        run: |
          mkdir -p android/app/src/main/kotlin/com/idaradz/idara_dz_android
          cp tools/android/MainActivity.kt android/app/src/main/kotlin/com/idaradz/idara_dz_android/MainActivity.kt

      - name: Remove default Flutter test file
        run: rm -rf test

      - name: Force modern Android SDK settings
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' android/app/build.gradle
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle
          fi
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/g' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' android/app/build.gradle.kts
          fi

      - name: Get packages
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDARA-DZ-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
